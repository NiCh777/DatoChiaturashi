<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>დათო ჭიათურაში - Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        #game-wrapper { position: relative; aspect-ratio: 400 / 600; max-height: 95vh; max-width: 95vw; border: 4px solid #333; border-radius: 12px; box-shadow: 0 0 40px #000; overflow: hidden; }
        canvas { background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); display: block; width: 100%; height: 100%; }
        
        #menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: #333; text-align: center; z-index: 15; padding: 20px; box-sizing: border-box;
        }
        
        input { padding: 12px; font-size: 18px; border: 2px solid #27ae60; border-radius: 10px; margin-bottom: 15px; width: 80%; text-align: center; outline: none; }
        
        .leaderboard { width: 90%; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-top: 15px; font-size: 14px; border: 1px solid #ddd; }
        .leaderboard h3 { margin: 5px 0; color: #27ae60; }
        .record-item { display: flex; justify-content: space-between; padding: 3px 10px; border-bottom: 1px solid #eee; }

        #startBtn { 
            padding: 12px 40px; font-size: 20px; cursor: pointer; 
            background: #27ae60; color: white; border: none; border-radius: 50px; 
            font-family: 'Permanent Marker', cursive; box-shadow: 0 5px 0 #1e8449; transition: 0.2s;
        }
        #ui { position: absolute; top: 15px; left: 15px; color: white; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); z-index: 5; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="ui">ქულა: 0</div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="menu-overlay">
        <h1 id="title">დათო ჭიათურაში</h1>
        
        <input type="text" id="playerName" placeholder="ჩაწერე შენი სახელი" maxlength="12">
        
        <button id="startBtn" onclick="startGame()">გაქცევა!</button>

        <div class="leaderboard">
            <h3>ტოპ რეკორდები</h3>
            <div id="records-list">
                <p>ჯერ რეკორდები არ არის</p>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menuOverlay = document.getElementById('menu-overlay');
    const nameInput = document.getElementById('playerName');
    const recordsList = document.getElementById('records-list');
    
    canvas.width = 400; canvas.height = 600;

    const playerImg = new Image(); playerImg.src = 'player.png';
    const busImg = new Image(); busImg.src = 'bus.png';
    const obstacleImg = new Image(); obstacleImg.src = 'obstacle.png';

    let player, platforms, emojis, cameraY, score, isRunning, frameCount, lastType, audioCtx;

    // რეკორდების ჩატვირთვა
    function updateLeaderboardUI() {
        let records = JSON.parse(localStorage.getItem('datoRecords')) || [];
        recordsList.innerHTML = '';
        if (records.length === 0) {
            recordsList.innerHTML = '<p>ჯერ რეკორდები არ არის</p>';
        } else {
            records.forEach(res => {
                recordsList.innerHTML += `<div class="record-item"><span>${res.name}</span><span>${res.score}</span></div>`;
            });
        }
    }

    function saveRecord(name, newScore) {
        let records = JSON.parse(localStorage.getItem('datoRecords')) || [];
        records.push({ name: name || 'უცნობი', score: newScore });
        records.sort((a, b) => b.score - a.score);
        records = records.slice(0, 5); // მხოლოდ ტოპ 5
        localStorage.setItem('datoRecords', JSON.stringify(records));
    }

    function init() {
        player = { x: 170, y: 450, w: 60, h: 60, dy: 0 };
        platforms = []; emojis = []; cameraY = 0; score = 0; frameCount = 0; isRunning = false; lastType = 'bus';
        document.getElementById('ui').innerText = "ქულა: 0";
        platforms.push({ x: 50, y: 550, w: 300, h: 45, type: 'bus' });
        for (let i = 1; i < 8; i++) addPlatform(550 - i * 100);
        updateLeaderboardUI();
    }

    function addPlatform(yPos) {
        let isObstacle = (lastType !== 'obstacle' && Math.random() < 0.15);
        if (isObstacle) {
            lastType = 'obstacle';
            let obsX = Math.random() * (canvas.width - 55);
            platforms.push({ x: obsX, y: yPos, w: 55, h: 55, type: 'obstacle' });
            let busX = (obsX > canvas.width / 2) ? obsX - 120 : obsX + 70;
            platforms.push({ x: busX, y: yPos, w: 110, h: 40, type: 'bus' });
        } else {
            lastType = 'bus';
            platforms.push({ x: Math.random() * (canvas.width - 110), y: yPos, w: 110, h: 40, type: 'bus' });
        }
    }

    function startGame() {
        if (!nameInput.value.trim()) { alert("გთხოვ ჩაწერო სახელი!"); return; }
        init();
        menuOverlay.style.display = 'none';
        isRunning = true;
        requestAnimationFrame(update);
    }

    function gameOver(reason) {
        isRunning = false;
        saveRecord(nameInput.value, score);
        menuOverlay.style.display = 'flex';
        let msg = (reason === 'poison') ? "დათო მოიწამლა ჭიათურის მარკეტში ნაყიდი ტვიქსით" : "დათო დაუბრუნდა ჭიათურას";
        
        menuOverlay.innerHTML = `
            <h1 style="color:#e74c3c">წააგე!</h1>
            <p style="margin:5px; color:#555">${msg}</p>
            <h2 style="margin:5px">ქულა: ${score}</h2>
            <button id="startBtn" onclick="location.reload()">თავიდან</button>
            <div class="leaderboard"><h3>ტოპ რეკორდები</h3><div id="records-list"></div></div>
        `;
        updateLeaderboardUI();
    }

    function update() {
        if (!isRunning) return;
        frameCount++;
        if (frameCount % 180 === 0) {
            let fromLeft = Math.random() < 0.5;
            emojis.push({ x: fromLeft ? -50 : 450, y: cameraY + 50 + Math.random() * 300, symbol: "🚀", speed: fromLeft ? 4 : -4 });
        }
        player.dy += 0.5; player.y += player.dy;
        if (player.y < cameraY + 280) cameraY = player.y - 280;
        for (let plat of platforms) {
            if (plat.type === 'bus' && player.dy > 0 && player.x + 15 < plat.x + plat.w && player.x + player.w - 15 > plat.x && player.y + player.h >= plat.y && player.y + player.h <= plat.y + 35) {
                player.dy = -14; break;
            }
            if (plat.type === 'obstacle' && player.x + 20 < plat.x + plat.w && player.x + player.w - 20 > plat.x && player.y + 20 < plat.y + plat.h && player.y + player.h - 20 > plat.y) {
                gameOver('poison'); return;
            }
        }
        for (let i = emojis.length - 1; i >= 0; i--) {
            let e = emojis[i]; e.x += e.speed;
            if (Math.abs(player.x + 30 - e.x) < 45 && Math.abs((player.y - cameraY + 30) - (e.y - cameraY)) < 45) {
                player.dy = -28; score += 100; document.getElementById('ui').innerText = "ქულა: " + score; emojis.splice(i, 1);
            }
            if (e.x < -100 || e.x > 500) emojis.splice(i, 1);
        }
        if (platforms[platforms.length - 1].y > cameraY - 100) { addPlatform(platforms[platforms.length - 1].y - 100); score += 10; document.getElementById('ui').innerText = "ქულა: " + score; }
        if (player.y > cameraY + canvas.height) gameOver('fall');
        draw(); requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        platforms.forEach(p => ctx.drawImage(p.type === 'obstacle' ? obstacleImg : busImg, p.x, p.y - cameraY, p.w, p.h));
        ctx.font = "35px Arial"; emojis.forEach(e => ctx.fillText(e.symbol, e.x, e.y - cameraY));
        ctx.drawImage(playerImg, player.x, player.y - cameraY, 60, 60);
    }

    function handleMove(clientX) {
        const rect = canvas.getBoundingClientRect();
        player.x = (clientX - rect.left) * (canvas.width / rect.width) - 30;
        if (player.x < 0) player.x = 0; if (player.x > canvas.width - 60) player.x = canvas.width - 60;
    }
    window.addEventListener('mousemove', (e) => { if (isRunning) handleMove(e.clientX); });
    window.addEventListener('touchmove', (e) => { if (isRunning) { handleMove(e.touches[0].clientX); e.preventDefault(); } }, { passive: false });
    
    updateLeaderboardUI();
</script>
</body>
</html>
