<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>დათოს გაქცევა ჭიათურიდან - THE HORROR</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        #game-wrapper { position: relative; aspect-ratio: 400 / 600; max-height: 95vh; max-width: 95vw; border: 4px solid #1a0000; border-radius: 12px; box-shadow: 0 0 50px #ff000033; overflow: hidden; }
        canvas { background: #000; display: block; width: 100%; height: 100%; }
        
        /* საწყისი დრამატული ეკრანი */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 2s;
        }
        
        #horror-title {
            font-family: 'Creepster', cursive; font-size: 45px; color: #8b0000;
            text-shadow: 0 0 20px #ff0000; opacity: 0; transform: scale(0.8);
            animation: fadeInShake 4s forwards; text-align: center; line-height: 1.2;
        }

        @keyframes fadeInShake {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
            70% { transform: translateX(-2px) rotate(-1deg); }
            80% { transform: translateX(2px) rotate(1deg); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* აღწერის ეკრანი */
        #menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c0000 0%, #000 100%);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; color: white; text-align: center; z-index: 15; padding: 30px;
        }
        
        .description { 
            font-size: 18px; color: #ffcccc; margin-bottom: 30px; 
            font-style: italic; text-shadow: 1px 1px 10px #000;
        }

        #startBtn { 
            padding: 15px 50px; font-size: 24px; cursor: pointer; 
            background: #8b0000; color: #fff; border: 2px solid #ff0000; 
            border-radius: 5px; font-family: 'Permanent Marker', cursive;
            box-shadow: 0 0 20px #ff0000; transition: 0.3s;
        }
        #startBtn:hover { background: #ff0000; box-shadow: 0 0 40px #ff0000; transform: scale(1.1); }

        #ui { position: absolute; top: 15px; left: 15px; color: #ff0000; font-size: 22px; font-weight: bold; z-index: 5; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="ui">ქულა: 0</div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="intro-overlay" onclick="startDramaticIntro()">
        <h1 id="horror-title">დათოს გაქცევა<br>ჭიათურიდან</h1>
        <p style="color: #444; margin-top: 20px; font-size: 12px;">(დააჭირე ეკრანს)</p>
    </div>

    <div id="menu-overlay">
        <h2 style="font-family: 'Creepster'; color: #ff4444; font-size: 35px;">მზად ხარ?</h2>
        <p class="description">ჭიათურის მარკეტებში ვადაგასული ტვიქსები დათოს ელოდებიან. ერთადერთი გზა მაღლაა...</p>
        <button id="startBtn" onclick="startGame()">გაიქეცი!</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const introOverlay = document.getElementById('intro-overlay');
    const menuOverlay = document.getElementById('menu-overlay');
    
    canvas.width = 400; canvas.height = 600;

    const playerImg = new Image(); playerImg.src = 'player.png';
    const busImg = new Image(); busImg.src = 'bus.png';
    const obstacleImg = new Image(); obstacleImg.src = 'obstacle.png';

    let player, platforms, emojis, cameraY, score, isRunning, frameCount, lastType;
    let audioCtx;

    // საშიში მუსიკის გენერატორი
    function playDramaticSound(freq, duration, vol) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function startDramaticIntro() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // საშიში ხმა (დაბალი ტონები)
        playDramaticSound(60, 4, 0.3);
        playDramaticSound(55, 4, 0.2);
        
        setTimeout(() => {
            introOverlay.style.opacity = '0';
            setTimeout(() => {
                introOverlay.style.display = 'none';
                menuOverlay.style.display = 'flex';
                // ამონათების ხმა
                playDramaticSound(200, 0.5, 0.1);
            }, 2000);
        }, 3500);
    }

    function init() {
        player = { x: 170, y: 450, w: 60, h: 60, dy: 0 };
        platforms = []; emojis = []; cameraY = 0; score = 0; frameCount = 0; isRunning = false; lastType = 'bus';
        document.getElementById('ui').innerText = "ქულა: 0";
        platforms.push({ x: 50, y: 550, w: 300, h: 45, type: 'bus' });
        for (let i = 1; i < 8; i++) addPlatform(550 - i * 100);
    }

    function addPlatform(yPos) {
        let type = (lastType === 'obstacle') ? 'bus' : (Math.random() < 0.12 ? 'obstacle' : 'bus');
        lastType = type;
        const w = type === 'obstacle' ? 55 : 110;
        platforms.push({ x: Math.random() * (canvas.width - w), y: yPos, w: w, h: type === 'obstacle' ? 55 : 40, type: type });
    }

    function startGame() {
        init();
        menuOverlay.style.display = 'none';
        canvas.style.background = 'linear-gradient(to bottom, #1a0000 0%, #000 100%)';
        isRunning = true;
        requestAnimationFrame(update);
    }

    function gameOver(reason) {
        isRunning = false;
        menuOverlay.style.display = 'flex';
        playDramaticSound(40, 1, 0.5);
        let txt = reason === 'poison' ? "დათო მოიწამლა... 🍫" : "დათო ჩაყლაპა ჭიათურამ... 🚌";
        menuOverlay.innerHTML = `<h1 style="font-family:'Creepster'; color:red; font-size:50px;">წააგე</h1><p class="description">${txt}</p><button id="startBtn" onclick="startGame()">კიდევ სცადე</button>`;
    }

    function update() {
        if (!isRunning) return;
        frameCount++;
        
        if (frameCount % 180 === 0) {
            let fromLeft = Math.random() < 0.5;
            emojis.push({ x: fromLeft ? -50 : 450, y: cameraY + 50 + Math.random() * 300, symbol: "🚀", speed: fromLeft ? 4 : -4 });
        }

        player.dy += 0.5; player.y += player.dy;
        if (player.y < cameraY + 280) cameraY = player.y - 280;

        for (let plat of platforms) {
            if (plat.type === 'bus' && player.dy > 0 && player.x + 15 < plat.x + plat.w && player.x + player.w - 15 > plat.x && player.y + player.h >= plat.y && player.y + player.h <= plat.y + 35) {
                player.dy = -14; break;
            }
            if (plat.type === 'obstacle' && player.x + 25 < plat.x + plat.w && player.x + player.w - 25 > plat.x && player.y + 25 < plat.y + plat.h && player.y + player.h - 25 > plat.y) {
                gameOver('poison'); return;
            }
        }

        for (let i = emojis.length - 1; i >= 0; i--) {
            let e = emojis[i]; e.x += e.speed;
            if (Math.abs(player.x + 30 - e.x) < 45 && Math.abs((player.y - cameraY + 30) - (e.y - cameraY)) < 45) {
                player.dy = -28; score += 100; document.getElementById('ui').innerText = "ქულა: " + score; emojis.splice(i, 1);
            }
            if (e.x < -100 || e.x > 500) emojis.splice(i, 1);
        }

        if (platforms[platforms.length - 1].y > cameraY - 100) { 
            addPlatform(platforms[platforms.length - 1].y - 100); 
            score += 10; document.getElementById('ui').innerText = "ქულა: " + score; 
        }

        if (player.y > cameraY + canvas.height) gameOver('fall');
        draw(); requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // ნისლის ეფექტი
        ctx.fillStyle = 'rgba(255, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        platforms.forEach(p => ctx.drawImage(p.type === 'obstacle' ? obstacleImg : busImg, p.x, p.y - cameraY, p.w, p.h));
        ctx.font = "35px Arial"; emojis.forEach(e => ctx.fillText(e.symbol, e.x, e.y - cameraY));
        ctx.drawImage(playerImg, player.x, player.y - cameraY, 60, 60);
    }

    function handleMove(clientX) {
        const rect = canvas.getBoundingClientRect();
        player.x = (clientX - rect.left) * (canvas.width / rect.width) - 30;
        if (player.x < 0) player.x = 0; if (player.x > canvas.width - 60) player.x = canvas.width - 60;
    }

    window.addEventListener('mousemove', (e) => { if (isRunning) handleMove(e.clientX); });
    window.addEventListener('touchmove', (e) => { if (isRunning) { handleMove(e.touches[0].clientX); e.preventDefault(); } }, { passive: false });
</script>
</body>
</html>
